name: Build morning briefing

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Build briefing page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py
      - name: Commit and push updated page
        run: |
          git config user.name "Morning Briefing Bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Briefing: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
